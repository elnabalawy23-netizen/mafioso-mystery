<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0a10"/>
      <stop offset="1" stop-color="#060508"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a1620"/>
      <stop offset="0.5" stop-color="#3a0e15"/>
      <stop offset="1" stop-color="#5a1620"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5e2a0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f5e2a0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181009"/>
      <stop offset="1" stop-color="#0c0805"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- gilded proscenium arch -->
  <path d="M30 400 L30 90 Q300 20 570 90 L570 400 L540 400 L540 104 Q300 48 60 104 L60 400 Z" fill="#1a1208"/>
  <path d="M44 400 L44 98 Q300 34 556 98 L556 400" fill="none" stroke="#8a651c" stroke-width="3" opacity="0.7"/>

  <!-- red curtains: heavy folds both sides -->
  <g fill="url(#curtain)">
    <path d="M60 96 Q86 240 64 400 L196 400 Q186 250 196 120 Q140 96 60 96 Z"/>
    <path d="M540 96 Q514 240 536 400 L404 400 Q414 250 404 120 Q460 96 540 96 Z"/>
  </g>
  <!-- fold shadows -->
  <g stroke="#22070c" stroke-width="6" opacity="0.8" fill="none">
    <path d="M96 110 Q112 250 96 396"/>
    <path d="M132 116 Q146 250 134 396"/>
    <path d="M168 122 Q178 252 172 396"/>
    <path d="M504 110 Q488 250 504 396"/>
    <path d="M468 116 Q454 250 466 396"/>
    <path d="M432 122 Q422 252 428 396"/>
  </g>
  <!-- curtain top valance -->
  <path d="M60 96 Q300 56 540 96 L540 130 Q470 106 420 124 Q380 96 300 110 Q220 96 180 124 Q130 106 60 130 Z" fill="#6b1a26"/>
  <g fill="#caa53f" opacity="0.7">
    <circle cx="180" cy="124" r="4"/>
    <circle cx="300" cy="112" r="4"/>
    <circle cx="420" cy="124" r="4"/>
  </g>

  <!-- stage floor -->
  <rect x="64" y="296" width="472" height="70" fill="url(#stage)"/>
  <g stroke="#241710" stroke-width="2" opacity="0.7">
    <line x1="80" y1="316" x2="520" y2="316"/>
    <line x1="90" y1="338" x2="510" y2="338"/>
  </g>

  <!-- spotlight cone from above center -->
  <path d="M286 0 L314 0 L376 312 L224 312 Z" fill="url(#cone)"/>
  <ellipse cx="300" cy="312" rx="86" ry="16" fill="#f5e2a0" opacity="0.3"/>

  <!-- conductor's baton lying in the light -->
  <g transform="rotate(-12 300 308)">
    <line x1="252" y1="308" x2="346" y2="308" stroke="#e8dcc0" stroke-width="3.4" stroke-linecap="round"/>
    <rect x="246" y="304" width="18" height="8" rx="4" fill="#241408"/>
  </g>
  <ellipse cx="300" cy="320" rx="56" ry="5" fill="#000" opacity="0.4"/>

  <!-- front row seats silhouettes -->
  <g fill="#08060a">
    <path d="M0 400 L0 372 Q40 358 76 372 L76 400 Z"/>
    <path d="M84 400 L84 370 Q124 356 160 370 L160 400 Z"/>
    <path d="M168 400 L168 368 Q208 354 244 368 L244 400 Z"/>
    <path d="M252 400 L252 366 Q292 352 328 366 L328 400 Z"/>
    <path d="M336 400 L336 368 Q376 354 412 368 L412 400 Z"/>
    <path d="M420 400 L420 370 Q460 356 496 370 L496 400 Z"/>
    <path d="M504 400 L504 372 Q544 358 580 372 L580 400 Z"/>
  </g>
  <!-- seat top glints -->
  <g stroke="#8a651c" stroke-width="1.6" opacity="0.35" fill="none">
    <path d="M252 366 Q292 352 328 366"/>
    <path d="M168 368 Q208 354 244 368"/>
    <path d="M336 368 Q376 354 412 368"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
