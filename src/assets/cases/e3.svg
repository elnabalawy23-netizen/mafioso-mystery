<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d15"/>
      <stop offset="1" stop-color="#05060b"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d484" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f2d484" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2638"/>
      <stop offset="0.5" stop-color="#0e1422"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1019"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2cf72" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#f2cf72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- back glass wall grid -->
  <g stroke="#121a2a" stroke-width="2.6">
    <line x1="0" y1="70" x2="600" y2="70"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="80" y1="40" x2="80" y2="230"/>
    <line x1="200" y1="40" x2="200" y2="230"/>
    <line x1="320" y1="40" x2="320" y2="230"/>
    <line x1="440" y1="40" x2="440" y2="230"/>
    <line x1="560" y1="40" x2="560" y2="230"/>
  </g>

  <!-- glass office back right with light spill -->
  <rect x="468" y="150" width="110" height="110" fill="#171207"/>
  <rect x="474" y="156" width="98" height="98" fill="#f0c75e" opacity="0.16"/>
  <rect x="492" y="170" width="60" height="8" fill="#caa53f" opacity="0.5"/>
  <rect x="492" y="186" width="44" height="8" fill="#caa53f" opacity="0.35"/>
  <circle cx="520" cy="206" r="40" fill="url(#warm)" opacity="0.6"/>

  <!-- ceiling spotlight + cone -->
  <rect x="262" y="34" width="76" height="12" rx="5" fill="#10151f"/>
  <circle cx="300" cy="44" r="7" fill="#f5d878"/>
  <path d="M286 48 L314 48 L420 296 L180 296 Z" fill="url(#cone)"/>

  <!-- car silhouette -->
  <g>
    <path d="M150 262 Q160 230 208 224 Q236 196 290 192 Q344 190 372 218 Q428 222 446 244 Q456 252 454 262 Z" fill="url(#carBody)"/>
    <!-- windows -->
    <path d="M240 222 Q262 200 296 198 Q330 198 350 218 Z" fill="#0a0f1c"/>
    <!-- wheels -->
    <circle cx="218" cy="262" r="22" fill="#05070d"/>
    <circle cx="218" cy="262" r="9" fill="#1a2233"/>
    <circle cx="396" cy="262" r="22" fill="#05070d"/>
    <circle cx="396" cy="262" r="9" fill="#1a2233"/>
    <!-- highlight line -->
    <path d="M170 246 Q300 226 444 250" stroke="#f2d484" stroke-width="2" fill="none" opacity="0.35"/>
    <!-- headlight glint -->
    <circle cx="446" cy="240" r="4" fill="#f5d878" opacity="0.9"/>
  </g>

  <!-- glossy floor -->
  <rect x="0" y="284" width="600" height="116" fill="url(#floor)"/>
  <ellipse cx="300" cy="290" rx="170" ry="10" fill="#f2d484" opacity="0.12"/>
  <!-- car reflection -->
  <g opacity="0.16" transform="translate(0 570) scale(1 -1)">
    <path d="M150 262 Q160 230 208 224 Q236 196 290 192 Q344 190 372 218 Q428 222 446 244 Q456 252 454 262 Z" fill="#1d2638"/>
  </g>
  <g stroke="#141a28" stroke-width="1.4" opacity="0.8">
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="356" x2="600" y2="356"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
