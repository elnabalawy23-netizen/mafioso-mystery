<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#05080b"/>
    </linearGradient>
    <linearGradient id="floorRef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11181f"/>
      <stop offset="1" stop-color="#06090c"/>
    </linearGradient>
    <radialGradient id="coldLight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bfe8ef" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#bfe8ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- corridor perspective -->
  <!-- ceiling -->
  <path d="M0 0 L600 0 L420 110 L180 110 Z" fill="#0c1117"/>
  <!-- walls -->
  <path d="M0 0 L180 110 L180 270 L0 400 Z" fill="#0d141b"/>
  <path d="M600 0 L420 110 L420 270 L600 400 Z" fill="#0c1219"/>
  <!-- end wall -->
  <rect x="180" y="110" width="240" height="160" fill="#0a0f15"/>
  <!-- floor -->
  <path d="M0 400 L180 270 L420 270 L600 400 Z" fill="url(#floorRef)"/>

  <!-- ceiling light strips: mostly off, one cold flicker -->
  <g fill="#10161d">
    <path d="M260 36 L340 36 L334 44 L266 44 Z"/>
    <path d="M232 78 L368 78 L362 86 L238 86 Z"/>
  </g>
  <path d="M250 60 L350 60 L344 68 L256 68 Z" fill="#bfe8ef" opacity="0.7"/>
  <ellipse cx="300" cy="120" rx="130" ry="70" fill="url(#coldLight)" opacity="0.4"/>

  <!-- doors on side walls -->
  <g fill="#101820">
    <path d="M60 92 L110 122 L110 240 L60 274 Z"/>
    <path d="M490 122 L540 92 L540 274 L490 240 Z"/>
  </g>
  <!-- door ajar with warm light (left, far) -->
  <path d="M196 150 L226 150 L226 252 L196 252 Z" fill="#0d1117"/>
  <path d="M199 153 L212 153 L212 250 L199 250 Z" fill="#f0c75e" opacity="0.8"/>
  <path d="M212 153 L228 158 L228 246 L212 250 Z" fill="#171207"/>
  <path d="M212 252 L300 320 L240 320 L199 252 Z" fill="#f2cf72" opacity="0.16"/>

  <!-- end window faint -->
  <rect x="312" y="150" width="60" height="70" fill="#0e1722"/>
  <line x1="342" y1="150" x2="342" y2="220" stroke="#0a0f15" stroke-width="4"/>

  <!-- wheelchair silhouette -->
  <g stroke="#161e29" stroke-width="5" fill="none">
    <circle cx="360" cy="260" r="26"/>
    <circle cx="394" cy="266" r="11"/>
    <path d="M340 212 L342 244 M342 234 L376 234 L382 254 M348 212 L368 212"/>
  </g>
  <circle cx="360" cy="260" r="4" fill="#161e29"/>
  <ellipse cx="370" cy="294" rx="42" ry="6" fill="#000" opacity="0.45"/>

  <!-- floor reflections -->
  <g opacity="0.5">
    <path d="M199 268 L212 268 L260 330 L230 330 Z" fill="#f0c75e" opacity="0.12"/>
    <path d="M280 280 L320 280 L350 360 L260 360 Z" fill="#bfe8ef" opacity="0.05"/>
  </g>
  <g stroke="#141b24" stroke-width="2" opacity="0.7">
    <line x1="120" y1="340" x2="480" y2="340"/>
    <line x1="60" y1="376" x2="540" y2="376"/>
  </g>

  <!-- clipboard dropped on floor -->
  <g transform="rotate(10 268 318)">
    <rect x="252" y="306" width="34" height="24" rx="2" fill="#1a212c"/>
    <rect x="256" y="310" width="26" height="16" rx="1" fill="#cdd4e0" opacity="0.85"/>
    <line x1="259" y1="315" x2="278" y2="315" stroke="#7e8696" stroke-width="1.4"/>
    <line x1="259" y1="320" x2="274" y2="320" stroke="#7e8696" stroke-width="1.4"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
