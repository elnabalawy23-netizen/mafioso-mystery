<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1320"/>
      <stop offset="0.65" stop-color="#0a0e18"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e9d8a0" stop-opacity="0.9"/>
      <stop offset="0.35" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="winlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5d878" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#e8b94e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e8b94e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a66" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a4a66" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="120" cy="92" r="64" fill="url(#moon)"/>
  <circle cx="120" cy="92" r="22" fill="#e9dcb0"/>
  <circle cx="113" cy="86" r="4" fill="#cdbe8d"/>
  <circle cx="128" cy="98" r="3" fill="#cdbe8d"/>

  <!-- stars -->
  <g fill="#cfd8ea">
    <circle cx="320" cy="60" r="1.4" opacity="0.8"/>
    <circle cx="420" cy="40" r="1.1" opacity="0.6"/>
    <circle cx="520" cy="70" r="1.5" opacity="0.7"/>
    <circle cx="250" cy="100" r="1" opacity="0.5"/>
    <circle cx="560" cy="120" r="1.1" opacity="0.5"/>
  </g>

  <!-- dead tree -->
  <g fill="#070a10">
    <path d="M70 320 L78 320 L76 250 L96 215 L92 212 L75 242 L72 190 L86 160 L82 158 L70 182 L62 150 L57 152 L66 196 L48 170 L44 174 L64 212 L62 250 L44 232 L41 236 L62 262 Z"/>
  </g>

  <!-- villa silhouette -->
  <g fill="#0a0e16">
    <rect x="300" y="186" width="240" height="134"/>
    <path d="M286 188 L420 120 L554 188 Z"/>
    <rect x="468" y="96" width="22" height="70"/>
    <rect x="350" y="232" width="40" height="88"/>
    <path d="M344 234 L370 216 L396 234 Z"/>
  </g>
  <!-- windows (dark) -->
  <g fill="#11182a">
    <rect x="416" y="210" width="30" height="40" rx="2"/>
    <rect x="470" y="210" width="30" height="40" rx="2"/>
    <rect x="470" y="266" width="30" height="44" rx="2"/>
  </g>
  <!-- the single lit window -->
  <circle cx="372" cy="262" r="46" fill="url(#winlight)"/>
  <rect x="358" y="244" width="28" height="38" rx="2" fill="#f3cf6d"/>
  <line x1="372" y1="244" x2="372" y2="282" stroke="#7a5c1d" stroke-width="2"/>
  <line x1="358" y1="263" x2="386" y2="263" stroke="#7a5c1d" stroke-width="2"/>

  <!-- ground + gate -->
  <rect x="0" y="318" width="600" height="82" fill="#06080d"/>
  <g stroke="#0e1320" stroke-width="4">
    <line x1="40" y1="318" x2="40" y2="356"/>
    <line x1="80" y1="318" x2="80" y2="356"/>
    <line x1="120" y1="318" x2="120" y2="356"/>
    <line x1="160" y1="318" x2="160" y2="356"/>
    <line x1="200" y1="318" x2="200" y2="356"/>
    <line x1="20" y1="324" x2="220" y2="324"/>
  </g>
  <ellipse cx="300" cy="330" rx="320" ry="26" fill="url(#mist)"/>

  <!-- rain -->
  <g stroke="#8fa3c8" stroke-width="1" opacity="0.18">
    <line x1="60" y1="20" x2="40" y2="90"/>
    <line x1="180" y1="0" x2="160" y2="70"/>
    <line x1="300" y1="30" x2="280" y2="100"/>
    <line x1="380" y1="0" x2="360" y2="64"/>
    <line x1="470" y1="20" x2="450" y2="92"/>
    <line x1="540" y1="0" x2="520" y2="66"/>
    <line x1="120" y1="120" x2="100" y2="190"/>
    <line x1="240" y1="130" x2="220" y2="200"/>
    <line x1="520" y1="140" x2="500" y2="210"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
