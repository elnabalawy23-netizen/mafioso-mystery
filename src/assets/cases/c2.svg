<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1220"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="doorGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2cf72" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#e8b94e" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e8b94e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="marquee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d080"/>
      <stop offset="1" stop-color="#b88a24"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <g fill="#cfd8ea">
    <circle cx="80" cy="50" r="1.3" opacity="0.7"/>
    <circle cx="170" cy="84" r="1" opacity="0.5"/>
    <circle cx="520" cy="44" r="1.4" opacity="0.7"/>
    <circle cx="560" cy="100" r="1" opacity="0.5"/>
    <circle cx="40" cy="120" r="1.1" opacity="0.5"/>
  </g>

  <!-- side wings -->
  <rect x="96" y="170" width="120" height="170" fill="#0a0f19"/>
  <rect x="384" y="170" width="120" height="170" fill="#0a0f19"/>
  <!-- main tower -->
  <rect x="216" y="96" width="168" height="244" fill="#0d1320"/>
  <path d="M216 96 L240 76 L360 76 L384 96 Z" fill="#0d1320"/>
  <rect x="288" y="58" width="24" height="22" fill="#0d1320"/>

  <!-- windows grid: mostly dark, a few lit -->
  <g fill="#161e30">
    <rect x="236" y="116" width="22" height="30" rx="1"/>
    <rect x="289" y="116" width="22" height="30" rx="1"/>
    <rect x="342" y="116" width="22" height="30" rx="1"/>
    <rect x="236" y="166" width="22" height="30" rx="1"/>
    <rect x="342" y="166" width="22" height="30" rx="1"/>
    <rect x="236" y="216" width="22" height="30" rx="1"/>
    <rect x="289" y="216" width="22" height="30" rx="1"/>
    <rect x="110" y="190" width="18" height="26" rx="1"/>
    <rect x="146" y="190" width="18" height="26" rx="1"/>
    <rect x="182" y="190" width="18" height="26" rx="1"/>
    <rect x="110" y="240" width="18" height="26" rx="1"/>
    <rect x="182" y="240" width="18" height="26" rx="1"/>
    <rect x="400" y="190" width="18" height="26" rx="1"/>
    <rect x="436" y="190" width="18" height="26" rx="1"/>
    <rect x="472" y="190" width="18" height="26" rx="1"/>
    <rect x="436" y="240" width="18" height="26" rx="1"/>
    <rect x="472" y="240" width="18" height="26" rx="1"/>
  </g>
  <!-- the royal suite: lit window -->
  <circle cx="300" cy="181" r="40" fill="url(#doorGlow)"/>
  <rect x="289" y="166" width="22" height="30" rx="1" fill="#f3cf6d"/>
  <rect x="146" y="240" width="18" height="26" rx="1" fill="#caa53f" opacity="0.8"/>
  <rect x="400" y="240" width="18" height="26" rx="1" fill="#caa53f" opacity="0.6"/>

  <!-- marquee strip (no letters) -->
  <rect x="294" y="100" width="12" height="58" rx="2" fill="url(#marquee)" opacity="0.9"/>

  <!-- entrance -->
  <circle cx="300" cy="318" r="64" fill="url(#doorGlow)"/>
  <path d="M262 340 L338 340 L326 296 L274 296 Z" fill="#1a1407"/>
  <rect x="282" y="300" width="36" height="40" rx="3" fill="#f0c75e"/>
  <line x1="300" y1="300" x2="300" y2="340" stroke="#6b4f15" stroke-width="3"/>
  <path d="M250 296 L350 296 L338 282 L262 282 Z" fill="#151b2b"/>
  <!-- lamps -->
  <g>
    <line x1="236" y1="340" x2="236" y2="298" stroke="#0e1422" stroke-width="4"/>
    <circle cx="236" cy="294" r="6" fill="#f0c75e"/>
    <circle cx="236" cy="294" r="14" fill="url(#doorGlow)"/>
    <line x1="364" y1="340" x2="364" y2="298" stroke="#0e1422" stroke-width="4"/>
    <circle cx="364" cy="294" r="6" fill="#f0c75e"/>
    <circle cx="364" cy="294" r="14" fill="url(#doorGlow)"/>
  </g>

  <!-- street -->
  <rect x="0" y="340" width="600" height="60" fill="#06080d"/>
  <ellipse cx="300" cy="344" rx="120" ry="8" fill="#e8b94e" opacity="0.12"/>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
