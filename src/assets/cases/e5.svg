<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1010"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2cf72" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f2cf72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- glowing green cross -->
  <circle cx="92" cy="86" r="64" fill="url(#greenGlow)"/>
  <g fill="#2f9e57">
    <rect x="74" y="58" width="36" height="56" rx="4"/>
    <rect x="64" y="68" width="56" height="36" rx="4"/>
  </g>
  <g fill="#5fe88f">
    <rect x="80" y="64" width="24" height="44" rx="3"/>
    <rect x="70" y="74" width="44" height="24" rx="3"/>
  </g>

  <!-- shelves with medicine bottles -->
  <g>
    <rect x="200" y="78" width="360" height="6" fill="#16201c"/>
    <rect x="200" y="148" width="360" height="6" fill="#16201c"/>
    <rect x="200" y="218" width="360" height="6" fill="#16201c"/>
    <!-- row 1 -->
    <g fill="#13251c">
      <rect x="216" y="44" width="20" height="34" rx="2"/>
      <rect x="244" y="50" width="16" height="28" rx="2"/>
      <rect x="268" y="40" width="24" height="38" rx="3"/>
      <rect x="304" y="52" width="14" height="26" rx="2"/>
      <rect x="330" y="44" width="20" height="34" rx="2"/>
      <rect x="362" y="50" width="16" height="28" rx="2"/>
      <rect x="390" y="40" width="24" height="38" rx="3"/>
      <rect x="428" y="52" width="14" height="26" rx="2"/>
      <rect x="454" y="44" width="20" height="34" rx="2"/>
      <rect x="486" y="48" width="18" height="30" rx="2"/>
      <rect x="516" y="42" width="22" height="36" rx="3"/>
    </g>
    <!-- row 2 -->
    <g fill="#1a2a20">
      <rect x="212" y="114" width="22" height="34" rx="2"/>
      <rect x="246" y="120" width="16" height="28" rx="2"/>
      <rect x="274" y="110" width="24" height="38" rx="3"/>
      <rect x="312" y="122" width="14" height="26" rx="2"/>
      <rect x="338" y="114" width="20" height="34" rx="2"/>
      <rect x="370" y="118" width="18" height="30" rx="2"/>
      <rect x="400" y="110" width="24" height="38" rx="3"/>
      <rect x="438" y="122" width="14" height="26" rx="2"/>
      <rect x="464" y="114" width="20" height="34" rx="2"/>
      <rect x="496" y="118" width="18" height="30" rx="2"/>
      <rect x="528" y="112" width="20" height="36" rx="3"/>
    </g>
    <!-- row 3: boxes -->
    <g fill="#11201a">
      <rect x="214" y="190" width="34" height="28" rx="2"/>
      <rect x="258" y="196" width="28" height="22" rx="2"/>
      <rect x="296" y="188" width="38" height="30" rx="2"/>
      <rect x="344" y="196" width="28" height="22" rx="2"/>
      <rect x="382" y="190" width="34" height="28" rx="2"/>
      <rect x="426" y="196" width="28" height="22" rx="2"/>
      <rect x="464" y="188" width="36" height="30" rx="2"/>
      <rect x="510" y="196" width="30" height="22" rx="2"/>
    </g>
    <!-- subtle label glints -->
    <g fill="#9adfb2" opacity="0.5">
      <rect x="272" y="52" width="16" height="4" rx="1"/>
      <rect x="394" y="52" width="16" height="4" rx="1"/>
      <rect x="278" y="122" width="16" height="4" rx="1"/>
      <rect x="404" y="122" width="16" height="4" rx="1"/>
      <rect x="302" y="196" width="22" height="4" rx="1"/>
      <rect x="470" y="196" width="22" height="4" rx="1"/>
    </g>
  </g>

  <!-- counter -->
  <rect x="120" y="262" width="440" height="14" fill="#1b1510"/>
  <rect x="132" y="276" width="416" height="68" fill="#100c08"/>
  <circle cx="340" cy="250" r="80" fill="url(#warm)"/>

  <!-- open drawer with scattered prescriptions -->
  <g>
    <rect x="176" y="282" width="92" height="26" rx="3" fill="#231a10"/>
    <rect x="183" y="288" width="78" height="16" rx="2" fill="#0a0705"/>
    <circle cx="222" cy="296" r="3" fill="#caa53f"/>
  </g>
  <g fill="#dde2ea" opacity="0.9">
    <rect x="300" y="240" width="44" height="26" rx="2" transform="rotate(-8 322 253)"/>
    <rect x="352" y="244" width="40" height="24" rx="2" transform="rotate(7 372 256)"/>
    <rect x="276" y="252" width="38" height="22" rx="2" transform="rotate(4 295 263)"/>
  </g>
  <g stroke="#7e8696" stroke-width="1.4" opacity="0.7">
    <line x1="306" y1="248" x2="336" y2="245"/>
    <line x1="306" y1="254" x2="332" y2="251"/>
    <line x1="358" y1="252" x2="386" y2="255"/>
    <line x1="358" y1="258" x2="380" y2="261"/>
  </g>
  <!-- a fallen bottle -->
  <g transform="rotate(86 452 262)">
    <rect x="442" y="240" width="20" height="34" rx="3" fill="#1a2a20"/>
    <rect x="446" y="234" width="12" height="8" rx="1" fill="#0e1812"/>
  </g>
  <g fill="#cfe8d4" opacity="0.8">
    <circle cx="486" cy="268" r="2.6"/>
    <circle cx="498" cy="262" r="2.6"/>
    <circle cx="508" cy="270" r="2.6"/>
  </g>

  <!-- floor -->
  <rect x="0" y="344" width="600" height="56" fill="#060805"/>
  <ellipse cx="340" cy="350" rx="180" ry="10" fill="#4ade80" opacity="0.05"/>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
