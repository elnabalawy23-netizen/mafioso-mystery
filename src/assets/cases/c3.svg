<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#081019"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1626"/>
      <stop offset="1" stop-color="#04070c"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eadfae" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="478" cy="96" r="58" fill="url(#moon)"/>
  <circle cx="478" cy="96" r="20" fill="#ead9a6"/>

  <g fill="#cfd8ea">
    <circle cx="80" cy="60" r="1.3" opacity="0.7"/>
    <circle cx="190" cy="40" r="1" opacity="0.6"/>
    <circle cx="300" cy="76" r="1.2" opacity="0.6"/>
    <circle cx="560" cy="40" r="1" opacity="0.5"/>
    <circle cx="40" cy="130" r="1" opacity="0.4"/>
  </g>

  <!-- sea -->
  <rect x="0" y="252" width="600" height="148" fill="url(#sea)"/>

  <!-- yacht silhouette -->
  <g>
    <!-- hull -->
    <path d="M120 252 L468 252 L444 292 L160 292 Z" fill="#070b12"/>
    <!-- decks -->
    <path d="M180 252 L180 224 L400 224 L424 252 Z" fill="#0a1019"/>
    <path d="M210 224 L210 200 L356 200 L376 224 Z" fill="#0c1320"/>
    <!-- bridge -->
    <path d="M238 200 L238 182 L312 182 L326 200 Z" fill="#0e1626"/>
    <!-- mast + antenna -->
    <line x1="284" y1="182" x2="284" y2="142" stroke="#0e1626" stroke-width="4"/>
    <line x1="284" y1="150" x2="316" y2="160" stroke="#0e1626" stroke-width="3"/>
    <!-- bow rail line -->
    <line x1="120" y1="252" x2="180" y2="236" stroke="#0a1019" stroke-width="5"/>
  </g>

  <!-- string lights -->
  <path d="M130 246 Q210 214 284 146" stroke="#caa53f" stroke-width="1.4" fill="none" opacity="0.8"/>
  <path d="M284 146 Q360 200 452 246" stroke="#caa53f" stroke-width="1.4" fill="none" opacity="0.8"/>
  <g fill="#f3cf6d">
    <circle cx="158" cy="236" r="2.4"/>
    <circle cx="196" cy="220" r="2.4"/>
    <circle cx="232" cy="196" r="2.4"/>
    <circle cx="262" cy="170" r="2.4"/>
    <circle cx="284" cy="148" r="2.6"/>
    <circle cx="318" cy="172" r="2.4"/>
    <circle cx="352" cy="196" r="2.4"/>
    <circle cx="392" cy="220" r="2.4"/>
    <circle cx="428" cy="238" r="2.4"/>
  </g>

  <!-- lit portholes -->
  <g fill="#f0c75e">
    <circle cx="206" cy="268" r="5"/>
    <circle cx="244" cy="268" r="5"/>
    <circle cx="282" cy="268" r="5"/>
    <circle cx="320" cy="268" r="5"/>
    <circle cx="358" cy="268" r="5"/>
    <circle cx="396" cy="268" r="5" opacity="0.45"/>
    <rect x="246" y="232" width="16" height="11" rx="2"/>
    <rect x="282" y="232" width="16" height="11" rx="2" opacity="0.5"/>
    <rect x="318" y="232" width="16" height="11" rx="2"/>
  </g>

  <!-- reflections -->
  <g opacity="0.5">
    <path d="M460 300 L496 300 L520 396 L436 396 Z" fill="url(#moon)" opacity="0.5"/>
    <g stroke="#caa53f" stroke-width="2" opacity="0.5">
      <line x1="206" y1="300" x2="206" y2="312"/>
      <line x1="244" y1="304" x2="244" y2="318"/>
      <line x1="282" y1="300" x2="282" y2="316"/>
      <line x1="320" y1="304" x2="320" y2="314"/>
      <line x1="358" y1="300" x2="358" y2="318"/>
    </g>
    <g stroke="#9fb3d8" stroke-width="1.4" opacity="0.35">
      <line x1="80" y1="320" x2="150" y2="320"/>
      <line x1="420" y1="334" x2="520" y2="334"/>
      <line x1="180" y1="348" x2="300" y2="348"/>
      <line x1="60" y1="368" x2="170" y2="368"/>
      <line x1="350" y1="372" x2="470" y2="372"/>
    </g>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
