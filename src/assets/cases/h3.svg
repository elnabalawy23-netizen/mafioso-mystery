<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="1" stop-color="#08101a"/>
    </linearGradient>
    <linearGradient id="nile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1828"/>
      <stop offset="1" stop-color="#04080d"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eadfae" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- crescent moon -->
  <circle cx="92" cy="78" r="52" fill="url(#moon)"/>
  <path d="M92 56 A22 22 0 1 0 92 100 A17 17 0 1 1 92 56 Z" fill="#ead9a6"/>

  <g fill="#cfd8ea">
    <circle cx="210" cy="50" r="1.2" opacity="0.7"/>
    <circle cx="300" cy="34" r="1" opacity="0.6"/>
    <circle cx="400" cy="58" r="1.3" opacity="0.7"/>
    <circle cx="500" cy="40" r="1" opacity="0.5"/>
    <circle cx="556" cy="86" r="1.2" opacity="0.6"/>
  </g>

  <!-- palm trees on the bank (right) -->
  <g fill="#070b10">
    <path d="M520 246 Q524 200 516 178 L524 178 Q534 204 530 246 Z"/>
    <g>
      <path d="M520 180 Q496 168 482 176 Q502 180 518 188 Z"/>
      <path d="M520 180 Q510 158 494 154 Q510 166 518 184 Z"/>
      <path d="M522 178 Q530 156 548 152 Q534 166 524 182 Z"/>
      <path d="M522 180 Q546 168 560 176 Q540 180 524 188 Z"/>
    </g>
    <path d="M566 252 Q570 216 564 200 L570 200 Q578 220 574 252 Z"/>
    <path d="M568 202 Q552 192 540 198 Q556 202 566 208 Z"/>
    <path d="M568 200 Q576 184 590 180 Q580 192 572 204 Z"/>
    <path d="M569 202 Q586 194 596 200 Q582 204 571 210 Z"/>
    <!-- bank -->
    <path d="M470 258 Q540 244 600 252 L600 268 L470 268 Z"/>
  </g>

  <!-- Nile water -->
  <rect x="0" y="258" width="600" height="142" fill="url(#nile)"/>

  <!-- cruise boat -->
  <g>
    <!-- hull -->
    <path d="M86 258 L462 258 L440 296 L112 296 Z" fill="#070b12"/>
    <!-- lower deck -->
    <rect x="116" y="226" width="320" height="32" rx="4" fill="#0b101a"/>
    <!-- upper deck -->
    <rect x="140" y="198" width="262" height="28" rx="4" fill="#0d1320"/>
    <!-- sun deck + canopy -->
    <rect x="168" y="178" width="180" height="20" rx="4" fill="#0f1626"/>
    <path d="M196 178 L232 160 L312 160 L336 178 Z" fill="#101a2c"/>
    <!-- funnel -->
    <rect x="356" y="166" width="18" height="32" rx="3" fill="#0e1424"/>
    <!-- railing lines -->
    <line x1="120" y1="222" x2="436" y2="222" stroke="#1a2336" stroke-width="2" opacity="0.8"/>
    <line x1="144" y1="194" x2="400" y2="194" stroke="#1a2336" stroke-width="2" opacity="0.8"/>
    <!-- lit windows: lower deck row -->
    <g fill="#f0c75e">
      <rect x="132" y="236" width="14" height="11" rx="2"/>
      <rect x="156" y="236" width="14" height="11" rx="2"/>
      <rect x="180" y="236" width="14" height="11" rx="2"/>
      <rect x="204" y="236" width="14" height="11" rx="2" opacity="0.4"/>
      <rect x="228" y="236" width="14" height="11" rx="2"/>
      <rect x="252" y="236" width="14" height="11" rx="2"/>
      <rect x="276" y="236" width="14" height="11" rx="2" opacity="0.4"/>
      <rect x="300" y="236" width="14" height="11" rx="2"/>
      <rect x="324" y="236" width="14" height="11" rx="2"/>
      <rect x="348" y="236" width="14" height="11" rx="2"/>
      <rect x="372" y="236" width="14" height="11" rx="2" opacity="0.4"/>
      <rect x="396" y="236" width="14" height="11" rx="2"/>
    </g>
    <!-- upper deck windows -->
    <g fill="#e8b94e">
      <rect x="158" y="206" width="12" height="10" rx="2"/>
      <rect x="182" y="206" width="12" height="10" rx="2" opacity="0.5"/>
      <rect x="206" y="206" width="12" height="10" rx="2"/>
      <rect x="230" y="206" width="12" height="10" rx="2"/>
      <rect x="254" y="206" width="12" height="10" rx="2" opacity="0.5"/>
      <rect x="278" y="206" width="12" height="10" rx="2"/>
      <rect x="302" y="206" width="12" height="10" rx="2"/>
      <rect x="326" y="206" width="12" height="10" rx="2"/>
      <rect x="350" y="206" width="12" height="10" rx="2" opacity="0.5"/>
      <rect x="374" y="206" width="12" height="10" rx="2"/>
    </g>
    <!-- one dark cabin among the lit (the crime scene) -->
    <rect x="228" y="236" width="14" height="11" rx="2" fill="#0a0e16"/>
    <!-- string lights on sun deck -->
    <path d="M170 176 Q258 158 346 176" stroke="#caa53f" stroke-width="1.2" fill="none" opacity="0.8"/>
    <g fill="#f3cf6d">
      <circle cx="196" cy="170" r="2"/>
      <circle cx="224" cy="164" r="2"/>
      <circle cx="258" cy="161" r="2"/>
      <circle cx="292" cy="163" r="2"/>
      <circle cx="322" cy="169" r="2"/>
    </g>
  </g>

  <!-- reflections on water -->
  <g opacity="0.5">
    <g stroke="#caa53f" stroke-width="2.4" opacity="0.5">
      <line x1="139" y1="302" x2="139" y2="318"/>
      <line x1="187" y1="306" x2="187" y2="324"/>
      <line x1="235" y1="302" x2="235" y2="316"/>
      <line x1="283" y1="306" x2="283" y2="326"/>
      <line x1="331" y1="302" x2="331" y2="318"/>
      <line x1="379" y1="306" x2="379" y2="322"/>
    </g>
    <g stroke="#9fb3d8" stroke-width="1.4" opacity="0.3">
      <line x1="60" y1="330" x2="160" y2="330"/>
      <line x1="240" y1="344" x2="360" y2="344"/>
      <line x1="430" y1="334" x2="540" y2="334"/>
      <line x1="100" y1="366" x2="230" y2="366"/>
      <line x1="330" y1="372" x2="470" y2="372"/>
    </g>
    <path d="M80 312 L108 312 L92 396 L60 396 Z" fill="url(#moon)" opacity="0.35"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
