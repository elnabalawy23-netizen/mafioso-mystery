<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1424"/>
      <stop offset="0.7" stop-color="#101a28"/>
      <stop offset="1" stop-color="#1a1a20"/>
    </linearGradient>
    <linearGradient id="duneA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2118"/>
      <stop offset="1" stop-color="#171310"/>
    </linearGradient>
    <linearGradient id="duneB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1812"/>
      <stop offset="1" stop-color="#0e0b08"/>
    </linearGradient>
    <radialGradient id="winGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5d878" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#e8b94e" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e8b94e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#cfd8ea">
    <circle cx="60" cy="40" r="1.3" opacity="0.8"/>
    <circle cx="150" cy="70" r="1" opacity="0.6"/>
    <circle cx="240" cy="36" r="1.4" opacity="0.7"/>
    <circle cx="330" cy="64" r="1" opacity="0.5"/>
    <circle cx="430" cy="30" r="1.2" opacity="0.7"/>
    <circle cx="520" cy="56" r="1" opacity="0.6"/>
    <circle cx="570" cy="92" r="1.2" opacity="0.5"/>
    <circle cx="100" cy="100" r="1" opacity="0.4"/>
  </g>

  <!-- swirling sand streaks -->
  <g stroke="#8a7448" fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M0 130 Q150 110 300 128 Q450 146 600 120" stroke-width="3"/>
    <path d="M0 170 Q180 150 360 168 Q480 178 600 162" stroke-width="2.4"/>
    <path d="M40 96 Q200 84 340 98" stroke-width="2"/>
  </g>
  <g stroke="#6b5a38" fill="none" stroke-linecap="round" opacity="0.2">
    <path d="M0 210 Q200 196 400 212 Q500 220 600 208" stroke-width="3"/>
  </g>

  <!-- far dune -->
  <path d="M0 280 Q140 236 300 268 Q460 298 600 252 L600 400 L0 400 Z" fill="url(#duneB)"/>

  <!-- research station -->
  <g>
    <!-- dome -->
    <path d="M210 268 Q210 204 282 204 Q354 204 354 268 Z" fill="#11161d"/>
    <path d="M222 268 Q222 214 282 214" stroke="#1c2430" stroke-width="3" fill="none"/>
    <!-- module -->
    <rect x="354" y="232" width="120" height="36" rx="8" fill="#11161d"/>
    <!-- lit round window on dome -->
    <circle cx="282" cy="244" r="38" fill="url(#winGlow)"/>
    <circle cx="282" cy="244" r="13" fill="#f3cf6d"/>
    <circle cx="282" cy="244" r="13" fill="none" stroke="#0d1117" stroke-width="3"/>
    <line x1="282" y1="231" x2="282" y2="257" stroke="#0d1117" stroke-width="2.4"/>
    <!-- module windows -->
    <rect x="372" y="242" width="16" height="12" rx="2" fill="#f0c75e" opacity="0.85"/>
    <rect x="398" y="242" width="16" height="12" rx="2" fill="#10161f"/>
    <rect x="424" y="242" width="16" height="12" rx="2" fill="#f0c75e" opacity="0.4"/>
    <!-- antenna mast -->
    <line x1="420" y1="232" x2="420" y2="150" stroke="#10161f" stroke-width="4"/>
    <line x1="404" y1="166" x2="436" y2="166" stroke="#10161f" stroke-width="3"/>
    <line x1="408" y1="182" x2="432" y2="182" stroke="#10161f" stroke-width="3"/>
    <circle cx="420" cy="146" r="4" fill="#e8413e" opacity="0.9"/>
    <!-- dish -->
    <path d="M196 232 Q186 210 206 200 Q222 192 232 206 Q224 226 196 232 Z" fill="#141a23"/>
    <line x1="212" y1="230" x2="212" y2="268" stroke="#10161f" stroke-width="4"/>
  </g>

  <!-- near dune -->
  <path d="M0 330 Q180 290 360 322 Q500 346 600 318 L600 400 L0 400 Z" fill="url(#duneA)"/>
  <!-- light spill on sand -->
  <ellipse cx="282" cy="300" rx="110" ry="20" fill="#e8b94e" opacity="0.12"/>

  <!-- wind-blown sand near ground -->
  <g stroke="#a08a58" fill="none" stroke-linecap="round" opacity="0.25">
    <path d="M60 344 Q160 334 260 346" stroke-width="2.4"/>
    <path d="M320 352 Q420 340 540 354" stroke-width="2.4"/>
  </g>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
