<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d14"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8413e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e8413e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3149"/>
      <stop offset="1" stop-color="#0e1b2b"/>
    </linearGradient>
    <linearGradient id="deskFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2233"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- ON AIR lamp (red, no text) -->
  <circle cx="300" cy="64" r="56" fill="url(#redGlow)"/>
  <rect x="266" y="48" width="68" height="28" rx="6" fill="#220a0a"/>
  <rect x="272" y="54" width="56" height="16" rx="4" fill="#e8413e" opacity="0.9"/>

  <!-- back wall screens -->
  <g>
    <rect x="60" y="96" width="120" height="74" rx="4" fill="url(#screen2)"/>
    <rect x="60" y="96" width="120" height="74" rx="4" fill="none" stroke="#0a0e16" stroke-width="3"/>
    <rect x="440" y="96" width="120" height="74" rx="4" fill="url(#screen2)"/>
    <rect x="440" y="96" width="120" height="74" rx="4" fill="none" stroke="#0a0e16" stroke-width="3"/>
    <!-- screen content hints -->
    <circle cx="100" cy="128" r="14" fill="#5fc4e8" opacity="0.4"/>
    <rect x="124" y="116" width="42" height="6" rx="2" fill="#5fc4e8" opacity="0.45"/>
    <rect x="124" y="130" width="34" height="6" rx="2" fill="#5fc4e8" opacity="0.3"/>
    <path d="M452 150 L480 124 L504 138 L530 112 L548 126" stroke="#5fc4e8" stroke-width="3" fill="none" opacity="0.5"/>
  </g>
  <!-- city backdrop panel between screens -->
  <rect x="206" y="110" width="188" height="92" rx="4" fill="#0d1624"/>
  <g fill="#16233a">
    <rect x="222" y="150" width="20" height="52"/>
    <rect x="252" y="134" width="24" height="68"/>
    <rect x="286" y="158" width="18" height="44"/>
    <rect x="314" y="128" width="22" height="74"/>
    <rect x="346" y="146" width="26" height="56"/>
  </g>
  <g fill="#e8c15a" opacity="0.6">
    <rect x="258" y="142" width="4" height="4"/><rect x="268" y="156" width="4" height="4"/>
    <rect x="320" y="138" width="4" height="4"/><rect x="328" y="154" width="4" height="4"/>
    <rect x="352" y="154" width="4" height="4"/>
  </g>

  <!-- talk-show desk -->
  <g>
    <path d="M330 232 Q420 218 510 232 L498 296 Q420 284 342 296 Z" fill="url(#deskFace)"/>
    <path d="M330 232 Q420 216 510 232 L510 240 Q420 224 330 240 Z" fill="#27324a"/>
    <!-- two empty chairs behind desk -->
    <g fill="#0c1018">
      <path d="M352 214 Q350 188 372 186 Q394 188 392 214 Z"/>
      <rect x="356" y="214" width="32" height="8" rx="3"/>
      <path d="M448 214 Q446 188 468 186 Q490 188 488 214 Z"/>
      <rect x="452" y="214" width="32" height="8" rx="3"/>
    </g>
    <!-- mug on desk -->
    <rect x="408" y="222" width="14" height="16" rx="2" fill="#171207"/>
    <path d="M422 226 Q430 228 422 234" stroke="#171207" stroke-width="3" fill="none"/>
  </g>

  <!-- studio camera (left, pointing right) -->
  <g>
    <rect x="96" y="196" width="74" height="44" rx="6" fill="#0d121d"/>
    <rect x="166" y="206" width="26" height="24" rx="3" fill="#0a0e17"/>
    <circle cx="196" cy="218" r="11" fill="#060910"/>
    <circle cx="196" cy="218" r="5" fill="#1d2c44"/>
    <rect x="108" y="184" width="34" height="14" rx="3" fill="#0a0e17"/>
    <circle cx="118" cy="190" r="3.4" fill="#e8413e"/>
    <!-- pedestal -->
    <rect x="124" y="240" width="12" height="56" fill="#0a0e17"/>
    <path d="M100 312 L160 312 L148 296 L112 296 Z" fill="#0a0e17"/>
    <circle cx="106" cy="318" r="7" fill="#080b12"/>
    <circle cx="154" cy="318" r="7" fill="#080b12"/>
  </g>
  <!-- second camera far right edge -->
  <g opacity="0.7">
    <rect x="540" y="216" width="44" height="32" rx="5" fill="#0b0f18"/>
    <rect x="552" y="248" width="9" height="48" fill="#090d14"/>
  </g>

  <!-- soft studio light pools -->
  <ellipse cx="420" cy="250" rx="160" ry="60" fill="#5fc4e8" opacity="0.05"/>
  <ellipse cx="300" cy="330" rx="240" ry="20" fill="#e8413e" opacity="0.05"/>

  <!-- floor -->
  <rect x="0" y="312" width="600" height="88" fill="#06070c"/>
  <g stroke="#10151f" stroke-width="2" opacity="0.8">
    <line x1="0" y1="338" x2="600" y2="338"/>
    <line x1="0" y1="372" x2="600" y2="372"/>
  </g>
  <!-- cable -->
  <path d="M96 360 Q200 340 290 362 Q380 382 470 358" stroke="#0d1018" stroke-width="5" fill="none"/>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
