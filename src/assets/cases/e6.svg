<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100c12"/>
      <stop offset="1" stop-color="#070509"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d484" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f2d484" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2cf72" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f2cf72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- round mirror on back wall -->
  <circle cx="120" cy="150" r="54" fill="#0d121f"/>
  <circle cx="120" cy="150" r="54" fill="none" stroke="#caa53f" stroke-width="3" opacity="0.65"/>
  <path d="M96 120 Q120 102 146 124" stroke="#9fb3d8" stroke-width="2" fill="none" opacity="0.25"/>

  <!-- spotlight cone on mannequin -->
  <rect x="356" y="30" width="64" height="10" rx="5" fill="#10131d"/>
  <circle cx="388" cy="38" r="6" fill="#f5d878"/>
  <path d="M376 42 L400 42 L470 300 L300 300 Z" fill="url(#cone)"/>

  <!-- mannequin -->
  <g>
    <circle cx="388" cy="120" r="17" fill="#16101a"/>
    <rect x="384" y="136" width="8" height="12" fill="#16101a"/>
    <!-- dress form -->
    <path d="M362 152 Q388 142 414 152 L408 216 Q388 228 368 216 Z" fill="#1d141f"/>
    <!-- skirt -->
    <path d="M368 214 Q388 224 408 214 L424 286 L352 286 Z" fill="#241726"/>
    <!-- gold sash -->
    <path d="M362 168 L414 184 L414 196 L362 180 Z" fill="#caa53f" opacity="0.8"/>
    <!-- stand -->
    <rect x="384" y="286" width="8" height="36" fill="#0d0a10"/>
    <ellipse cx="388" cy="326" rx="30" ry="7" fill="#0d0a10"/>
  </g>

  <!-- clothes rack -->
  <g>
    <line x1="160" y1="180" x2="320" y2="180" stroke="#141021" stroke-width="5"/>
    <line x1="170" y1="180" x2="170" y2="320" stroke="#141021" stroke-width="6"/>
    <line x1="310" y1="180" x2="310" y2="320" stroke="#141021" stroke-width="6"/>
    <!-- hangers + garments -->
    <g>
      <line x1="196" y1="180" x2="196" y2="192" stroke="#3d3424" stroke-width="2"/>
      <path d="M180 196 L212 196 L208 268 L184 268 Z" fill="#1a1322"/>
      <line x1="228" y1="180" x2="228" y2="192" stroke="#3d3424" stroke-width="2"/>
      <path d="M214 196 L242 196 L240 252 L216 252 Z" fill="#23182a"/>
      <line x1="258" y1="180" x2="258" y2="192" stroke="#3d3424" stroke-width="2"/>
      <path d="M242 196 L274 196 L270 276 L246 276 Z" fill="#161226"/>
      <line x1="288" y1="180" x2="288" y2="192" stroke="#3d3424" stroke-width="2"/>
      <path d="M276 196 L302 196 L300 246 L278 246 Z" fill="#1f1620"/>
    </g>
  </g>

  <!-- folded clothes table -->
  <g>
    <rect x="452" y="252" width="120" height="10" fill="#191019"/>
    <rect x="462" y="262" width="10" height="58" fill="#100a10"/>
    <rect x="552" y="262" width="10" height="58" fill="#100a10"/>
    <g fill="#221728">
      <rect x="470" y="236" width="40" height="8" rx="2"/>
      <rect x="470" y="228" width="40" height="8" rx="2" fill="#2a1b2e"/>
      <rect x="520" y="240" width="36" height="6" rx="2"/>
      <rect x="520" y="234" width="36" height="6" rx="2" fill="#1b1322"/>
    </g>
  </g>

  <!-- warm shop light pools -->
  <circle cx="388" cy="200" r="90" fill="url(#warm)" opacity="0.5"/>
  <circle cx="240" cy="230" r="70" fill="url(#warm)" opacity="0.25"/>

  <!-- floor -->
  <rect x="0" y="322" width="600" height="78" fill="#080609"/>
  <ellipse cx="388" cy="330" rx="120" ry="9" fill="#f2cf72" opacity="0.1"/>
  <!-- fallen hanger + button -->
  <g stroke="#3d3424" stroke-width="2.4" fill="none" opacity="0.9">
    <path d="M218 348 L238 340 L258 348 M238 340 L238 334 Q238 330 242 330"/>
  </g>
  <circle cx="294" cy="354" r="4" fill="#caa53f"/>
  <circle cx="294" cy="354" r="1.4" fill="#0d0a10"/>

  <rect width="600" height="400" fill="url(#vig)"/>
</svg>
